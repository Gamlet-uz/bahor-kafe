<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bahor Kafe</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --brand-green: #4CAF50;
            --main-green: #d4edda;
            --inactive-gray: #f1f1f1;
            --text-gray: #8e8e93;
            --danger-red: #ff3b30;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 0;
            background-color: #fff;
            display: flex; flex-direction: column;
            height: 100vh; user-select: none;
            overflow: hidden;
        }

        /* HEADER */
        .header { display: flex; align-items: center; padding: 15px; background: white; position: sticky; top: 0; z-index: 100; }
        .brand { flex: 1; font-size: 22px; font-weight: 800; color: var(--brand-green); }
        .search-container { flex: 3; display: flex; align-items: center; background: #f1f1f1; padding: 8px 12px; border-radius: 10px; }
        .search-container input { border: none; background: transparent; outline: none; width: 100%; font-size: 14px; margin-left: 8px; }

        /* CATEGORIES */
        .categories-wrapper { background: white; padding: 10px 0; border-bottom: 1px solid #f5f5f5; }
        .categories-container { display: flex; overflow-x: auto; white-space: nowrap; padding: 0 15px; gap: 10px; scrollbar-width: none; }
        .category-btn { background: white; border: 1px solid #eee; padding: 8px 18px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; }
        .category-btn.active { background: var(--main-green); border-color: var(--main-green); }

        #main-content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 90px; }

        /* PRODUCT CARDS (AVVALGI USLUB) */
        .products-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .product-card { background: white; border: 1px solid #eee; border-radius: 12px; padding: 10px; text-align: center; }
        .product-card img { width: 100%; height: 100px; object-fit: cover; border-radius: 8px; margin-bottom: 8px; }
        .product-name { font-size: 14px; font-weight: 600; min-height: 38px; }
        .product-price { font-size: 13px; font-weight: bold; margin-bottom: 10px; }

        /* COUNTER -1 + (AVVALGI USLUB) */
        .counter-container { display: flex; justify-content: space-between; align-items: center; background: #eee; border-radius: 8px; height: 35px; }
        .btn-mini { background: none; border: none; font-size: 20px; font-weight: bold; width: 35px; cursor: pointer; }
        .add-to-cart-btn { width: 100%; background: #eee; border: none; padding: 8px 0; border-radius: 8px; font-weight: 700; cursor: pointer; }

        /* MODALS */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 3000; justify-content: center; align-items: center; }
        .custom-modal { background: white; width: 85%; border-radius: 20px; padding: 25px; text-align: center; }
        .modal-input { width: 90%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; text-align: center; outline: none; }
        .modal-btns { display: flex; gap: 10px; }
        .modal-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; }
        .btn-confirm { background: var(--brand-green); color: white; }
        .btn-cancel { background: #f1f1f1; color: black; }

        /* PROFILE PAGE */
        #profile-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; }
        .profile-header { padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #f5f5f5; }
        .profile-list { list-style: none; padding: 0; margin: 0; }
        .profile-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid #f5f5f5; }
        .btn-select-green { background: var(--brand-green); color: white; border: none; padding: 6px 15px; border-radius: 6px; font-size: 12px; font-weight: bold; }

        /* ORDER CARD */
        .order-card { background: white; border: 1px solid #eee; border-radius: 15px; padding: 15px; margin-bottom: 15px; }

        /* BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: white; display: flex; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-gray); font-size: 10px; position: relative; }
        .nav-item.active { color: #000; }
        .nav-item svg { width: 24px; height: 24px; fill: currentColor; margin-bottom: 4px; }
        .badge { position: absolute; top: 10px; right: 20%; background: var(--danger-red); color: white; font-size: 10px; min-width: 16px; height: 16px; border-radius: 50%; display: none; justify-content: center; align-items: center; border: 2px solid white; }
    </style>
</head>
<body>

    <div id="edit-modal" class="modal-overlay">
        <div class="custom-modal">
            <h3 id="modal-title">Sarlavha</h3>
            <input type="text" id="modal-field" class="modal-input">
            <div class="modal-btns">
                <button class="modal-btn btn-cancel" onclick="closeEditModal()">Bekor qilish</button>
                <button class="modal-btn btn-confirm" onclick="saveEditModal()">Tasdiqlash</button>
            </div>
        </div>
    </div>

    <div id="msg-modal" class="modal-overlay"><div class="custom-modal"><p id="msg-text"></p><button class="modal-btn btn-confirm" onclick="closeModal('msg-modal')">Tushunarli</button></div></div>
    <div id="order-type-modal" class="modal-overlay"><div class="custom-modal"><h3>Buyurtma turi</h3><div class="modal-btns" style="flex-direction:column"><button class="modal-btn btn-confirm" onclick="handleOrderType('pickup')">Olib ketish</button><button class="modal-btn btn-confirm" style="background:#007bff" onclick="handleOrderType('delivery')">Yetkazib berish</button></div></div></div>

    <header class="header">
        <div class="brand">Bahor</div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Ovqat izlash..." oninput="searchProduct()">
        </div>
    </header>

    <div class="categories-wrapper" id="cat-wrapper">
        <div class="categories-container">
            <button class="category-btn active" onclick="selectCategory(this, 'Lavash')">Lavash</button>
            <button class="category-btn" onclick="selectCategory(this, 'Hot-dog')">Hot-dog</button>
            <button class="category-btn" onclick="selectCategory(this, 'Desertlar')">Desertlar</button>
            <button class="category-btn" onclick="selectCategory(this, 'Ichimliklar')">Ichimliklar</button>
        </div>
    </div>

    <div id="main-content"></div>

    <div id="profile-page">
        <div class="profile-header">
            <button class="btn-mini" onclick="closeProfile()"> < </button>
            <div style="flex:1; text-align:center; font-weight:bold;">Ma'lumotlar</div>
        </div>
        <ul class="profile-list">
            <li class="profile-item"><span>Ism</span><span id="p-name">---</span><button class="btn-select-green" onclick="openEdit('name')">Tanlash</button></li>
            <li class="profile-item"><span>Telefon raqam</span><span id="p-phone">---</span><button class="btn-select-green" onclick="openEdit('phone')">Tanlash</button></li>
            <li class="profile-item"><span>Tug'ilgan kuni</span><span id="p-dob">---</span><button class="btn-select-green" onclick="openEdit('dob')">Tanlash</button></li>
        </ul>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="changeTab(this, 'Menyu')"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Menyu</span></div>
        <div class="nav-item" onclick="changeTab(this, 'Savat')"><div class="badge" id="cart-badge">0</div><svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg><span>Savat</span></div>
        <div class="nav-item" onclick="changeTab(this, 'Buyurtmalar')"><svg viewBox="0 0 24 24"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1s-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg><span>Buyurtmalar</span></div>
        <div class="nav-item" onclick="openProfile()"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><span>Profil</span></div>
    </nav>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let cart = {};
        let orders = [];
        let currentCategory = 'Lavash';
        let currentEditField = '';
        let userProfile = { name: '', phone: '', dob: '' };

        const allProducts = {
            'Lavash': [{ id: 101, name: "Mol go’shtli lavash", price: 32000, img: "https://images.unsplash.com/photo-1626700051175-6818013e1d4f?w=400" }],
            'Hot-dog': [{ id: 201, name: "Klassik hot-dog", price: 15000, img: "https://images.unsplash.com/photo-1541232399669-e347660605af?w=400" }],
            'Desertlar': [{ id: 301, name: "Muzqaymoq", price: 10000, img: "https://images.unsplash.com/photo-1501443762994-82bd5dabb89a?w=400" }],
            'Ichimliklar': [{ id: 401, name: "Coca-Cola 0.5", price: 8000, img: "https://images.unsplash.com/photo-1622483767028-3f66f34aef97?w=400" }]
        };

        // RENDER PRODUCTS
        function renderProducts(list) {
            const container = document.getElementById('main-content');
            let html = `<div class="products-grid">`;
            list.forEach(p => {
                const qty = cart[p.id] ? cart[p.id].qty : 0;
                html += `
                    <div class="product-card">
                        <img src="${p.img}">
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">${p.price.toLocaleString()} so'm</div>
                        <div id="ctrl-${p.id}">
                            ${qty > 0 ? 
                                `<div class="counter-container"><button class="btn-mini" onclick="updateQty(${p.id},-1)">-</button><span>${qty}</span><button class="btn-mini" onclick="updateQty(${p.id},1)">+</button></div>` : 
                                `<button class="add-to-cart-btn" onclick="updateQty(${p.id},1)">Savatga</button>`
                            }
                        </div>
                    </div>`;
            });
            container.innerHTML = html + `</div>`;
        }

        function updateQty(id, delta) {
            if (!cart[id]) {
                let p; for(let c in allProducts) { p = allProducts[c].find(x => x.id === id) || p; }
                cart[id] = { ...p, qty: 0 };
            }
            cart[id].qty += delta;
            if (cart[id].qty <= 0) delete cart[id];
            updateBadge();
            renderProducts(allProducts[currentCategory]);
        }

        function updateBadge() {
            const count = Object.values(cart).reduce((a, b) => a + b.qty, 0);
            const b = document.getElementById('cart-badge');
            b.innerText = count; b.style.display = count > 0 ? 'flex' : 'none';
        }

        // PROFILE LOGIC
        function openProfile() { document.getElementById('profile-page').style.display = 'block'; }
        function closeProfile() { document.getElementById('profile-page').style.display = 'none'; }

        function openEdit(field) {
            currentEditField = field;
            const modal = document.getElementById('edit-modal');
            const title = document.getElementById('modal-title');
            const input = document.getElementById('modal-field');
            input.value = '';
            
            if(field === 'name') title.innerText = "Ismni kiriting";
            if(field === 'phone') { title.innerText = "Telefon raqam"; input.value = "+998 "; }
            if(field === 'dob') title.innerText = "Tug'ilgan kun (KK/OO/YYYY)";

            modal.style.display = 'flex';
            input.focus();
        }

        function closeEditModal() { document.getElementById('edit-modal').style.display = 'none'; }

        // INPUT MASKALAR
        document.getElementById('modal-field').addEventListener('input', function(e) {
            if (currentEditField === 'phone') {
                let x = e.target.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,2})(\d{0,3})(\d{0,2})(\d{0,2})/);
                // 998 + 2 + 3 + 2 + 2
                let val = "+998 ";
                if (x[2]) val += x[2] + " ";
                if (x[3]) val += x[3] + " ";
                if (x[4]) val += x[4] + " ";
                if (x[5]) val += x[5];
                e.target.value = val.trim();
            }
            if (currentEditField === 'dob') {
                let v = e.target.value.replace(/\D/g, '');
                if (v.length > 8) v = v.substring(0,8);
                
                let day = v.substring(0,2);
                if (parseInt(day) > 31) day = "31";
                
                let month = v.substring(2,4);
                if (parseInt(month) > 12) month = "12";
                
                let year = v.substring(4,8);
                
                let res = day;
                if (v.length > 2) res += "/" + month;
                if (v.length > 4) res += "/" + year;
                e.target.value = res;
            }
        });

        function saveEditModal() {
            const val = document.getElementById('modal-field').value;
            if(!val || val === "+998") return;

            if(currentEditField === 'name') { userProfile.name = val; document.getElementById('p-name').innerText = val; }
            if(currentEditField === 'phone') { userProfile.phone = val; document.getElementById('p-phone').innerText = val; }
            if(currentEditField === 'dob') { userProfile.dob = val; document.getElementById('p-dob').innerText = val; }
            
            closeEditModal();
        }

        // ORDER LOGIC
        function handleOrderType(type) {
            closeModal('order-type-modal');
            if (type === 'delivery') {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(pos => {
                        finalizeOrder('Yetkazib berish', `${pos.coords.latitude}, ${pos.coords.longitude}`);
                    }, () => { finalizeOrder('Yetkazib berish', 'Geolokatsiya rad etildi'); });
                }
            } else {
                finalizeOrder('Olib ketish');
            }
        }

        function finalizeOrder(type, loc = "") {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0') + " " + now.getDate().toString().padStart(2,'0') + "/" + (now.getMonth()+1).toString().padStart(2,'0') + "/" + now.getFullYear();
            
            const newOrder = {
                time: timeStr,
                items: Object.values(cart),
                total: Object.values(cart).reduce((a,b) => a + (b.price*b.qty), 0),
                type: type,
                location: loc
            };
            orders.unshift(newOrder);
            cart = {};
            updateBadge();
            showMessage("Buyurtmangiz qabul qilindi!");
        }

        function showOrders() {
            const container = document.getElementById('main-content');
            let html = "<h2>Buyurtmalar</h2>";
            orders.forEach(o => {
                html += `<div class="order-card">
                    <div style="font-size:12px; color:gray; border-bottom:1px solid #eee; margin-bottom:10px; display:flex; justify-content:space-between">
                        <span>${o.time}</span><span>${o.type}</span>
                    </div>`;
                o.items.forEach(i => {
                    html += `<div style="display:flex; justify-content:space-between; font-size:14px">
                        <span>${i.name} x ${i.qty}</span><span>${(i.price*i.qty).toLocaleString()}</span>
                    </div>`;
                });
                html += `<div style="border-top:1px dashed #ccc; margin-top:10px; padding-top:10px; font-weight:bold; text-align:right">Jami: ${o.total.toLocaleString()} so'm</div>
                <div style="text-align:center; color:var(--brand-green); font-style:italic; margin-top:10px">Xaridingiz uchun rahmat!</div></div>`;
            });
            container.innerHTML = html || "<p style='text-align:center; color:gray'>Buyurtmalar yo'q</p>";
        }

        function showCart() {
            const container = document.getElementById('main-content');
            let total = 0;
            let html = "<h2>Savat</h2>";
            const items = Object.values(cart);
            items.forEach(i => {
                total += i.price * i.qty;
                html += `<div class="order-card" style="display:flex; align-items:center; gap:10px">
                    <img src="${i.img}" style="width:50px; border-radius:5px">
                    <div style="flex:1"><b>${i.name}</b><br>${i.qty} x ${i.price.toLocaleString()}</div>
                    <div class="counter-container"><button class="btn-mini" onclick="updateQty(${i.id},-1);showCart()">-</button><span>${i.qty}</span><button class="btn-mini" onclick="updateQty(${i.id},1);showCart()">+</button></div>
                </div>`;
            });
            if (items.length === 0) html += "<p style='text-align:center'>Savat bo'sh</p>";
            else html += `<div style="text-align:right; font-weight:bold; margin-bottom:20px">Jami: ${total.toLocaleString()} so'm</div>
                <button onclick="openModal('order-type-modal')" style="width:100%; background:var(--brand-green); color:white; border:none; padding:15px; border-radius:10px; font-weight:bold">Buyurtma berish</button>`;
            container.innerHTML = html;
        }

        // TABS
        function changeTab(el, t) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('cat-wrapper').style.display = t === 'Menyu' ? 'block' : 'none';
            if (t === 'Menyu') renderProducts(allProducts[currentCategory]);
            else if (t === 'Savat') showCart();
            else if (t === 'Buyurtmalar') showOrders();
        }

        function selectCategory(el, c) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            currentCategory = c;
            renderProducts(allProducts[c]);
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function showMessage(t) { document.getElementById('msg-text').innerText = t; openModal('msg-modal'); }

        window.onload = () => { renderProducts(allProducts['Lavash']); };
    </script>
</body>
</html>
