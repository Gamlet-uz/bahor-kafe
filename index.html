<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bahor Kafe</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --brand-green: #4CAF50; --bg: #f8f9fa; --text: #333; --gray: #8e8e93; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* HEADER */
        .header { background: white; padding: 12px 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px; z-index: 100; }
        .brand { font-size: 20px; font-weight: 800; color: var(--brand-green); white-space: nowrap; }
        .search-box { background: #efeff4; border-radius: 10px; display: flex; align-items: center; padding: 6px 12px; flex: 1; }
        .search-box input { border: none; background: transparent; outline: none; width: 100%; font-size: 14px; height: 24px; }

        /* KATEGORIYALAR */
        .cats-wrapper { background: white; padding: 10px 0; border-bottom: 1px solid #eee; overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
        .cats-wrapper::-webkit-scrollbar { display: none; }
        .cat-btn { display: inline-block; padding: 8px 16px; margin: 0 5px; border-radius: 15px; background: #f0f0f0; font-size: 13px; font-weight: 600; cursor: pointer; border: none; color: #555; }
        .cat-btn.active { background: var(--brand-green); color: white; }

        /* KONTENT */
        #main-content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 90px; }
        .products-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .product-card { background: white; border-radius: 15px; padding: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); text-align: center; }
        .product-card img { width: 100%; height: 100px; object-fit: cover; border-radius: 10px; }
        .price { color: var(--brand-green); font-weight: bold; margin: 5px 0; font-size: 14px; }
        
        .add-btn { width: 100%; background: #f0f0f0; border: none; padding: 8px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .counter { display: flex; justify-content: space-between; align-items: center; background: var(--brand-green); color: white; border-radius: 8px; overflow: hidden; }
        .btn-m { background: none; border: none; color: white; font-size: 18px; padding: 5px 12px; cursor: pointer; font-weight: bold; }

        /* SAHIFALAR */
        .page { display: none; position: absolute; top: 0; left: 0; width: 100%; height: calc(100% - 75px); background: white; z-index: 1000; overflow-y: auto; padding: 15px; box-sizing: border-box; }
        .page-active { display: block; }

        /* NAVIGATION BAR */
        .nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: white; border-top: 1px solid #eee; display: flex; z-index: 1100; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: var(--gray); cursor: pointer; transition: 0.2s; }
        .nav-item span { font-size: 22px; margin-bottom: 4px; filter: grayscale(100%); opacity: 0.6; }
        
        /* BOSILGANDA QORA BO'LISHI */
        .nav-item.active { color: #000; }
        .nav-item.active span { filter: grayscale(0%); opacity: 1; transform: scale(1.1); }
        .nav-item.active b { font-weight: 800; }

        .badge { position: absolute; top: 12px; right: 28%; background: #ff3b30; color: white; font-size: 10px; min-width: 16px; height: 16px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-weight: bold; border: 2px solid white; }
    </style>
</head>
<body>

    <header class="header" id="app-header">
        <div class="brand">Bahor</div>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Qidirish..." oninput="searchProduct()">
        </div>
    </header>

    <div id="menu-view" style="display: flex; flex-direction: column; flex: 1; overflow: hidden;">
        <div class="cats-wrapper">
            <button class="cat-btn active" onclick="filterCat('Hammasi', this)">Hammasi</button>
            <button class="cat-btn" onclick="filterCat('Lavash', this)">Lavash</button>
            <button class="cat-btn" onclick="filterCat('Hot-dog', this)">Hot-dog</button>
            <button class="cat-btn" onclick="filterCat('Ichimliklar', this)">Ichimliklar</button>
        </div>
        <div id="main-content"></div>
    </div>

    <div id="cart-page" class="page"><h2>Savat</h2><div id="cart-items"></div></div>
    <div id="orders-page" class="page"><h2>Buyurtmalarim</h2><div id="orders-list"></div></div>
    <div id="profile-page" class="page"><h2>Profil</h2><div id="profile-info"></div></div>

    <nav class="nav">
        <div class="nav-item active" onclick="showTab('menu', this)"><span>🏠</span><b>Menyu</b></div>
        <div class="nav-item" onclick="showTab('cart', this)"><div id="cart-badge" class="badge">0</div><span>🛒</span><b>Savat</b></div>
        <div class="nav-item" onclick="showTab('orders', this)"><span>📋</span><b>Buyurtmalar</b></div>
        <div class="nav-item" onclick="showTab('profile', this)"><span>👤</span><b>Profil</b></div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB0ieeweZD3XoCCuJkGQRiJ86buVKchGpw",
            authDomain: "bahor-kafe.firebaseapp.com",
            projectId: "bahor-kafe",
            storageBucket: "bahor-kafe.firebasestorage.app",
            messagingSenderId: "673559226993",
            appId: "1:673559226993:web:a83a463f6216eedce989d0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const MY_ID = 5630950142;

        let tg = window.Telegram.WebApp;
        let userId = tg.initDataUnsafe?.user?.id || 0;
        let cart = {};
        let products = [];
        let filtered = [];

        // BAZADAN MAHSULOTLARNI OLISH
        onSnapshot(collection(db, "products"), (snap) => {
            products = [];
            snap.forEach(d => products.push({id: d.id, ...d.data()}));
            filtered = products;
            renderMenu();
        });

        window.renderMenu = () => {
            const cont = document.getElementById('main-content');
            let html = '<div class="products-grid">';
            filtered.forEach(p => {
                const q = cart[p.id]?.qty || 0;
                html += `<div class="product-card">
                    <img src="${p.img || 'https://via.placeholder.com/150'}">
                    <div style="font-weight:bold; font-size:14px; margin:8px 0; height:36px; overflow:hidden">${p.name}</div>
                    <div class="price">${p.price.toLocaleString()} so'm</div>
                    ${q > 0 ? `<div class="counter"><button class="btn-m" onclick="upd('${p.id}',-1)">-</button><span>${q}</span><button class="btn-m" onclick="upd('${p.id}',1)">+</button></div>` : `<button class="add-btn" onclick="upd('${p.id}',1)">Savatga</button>`}
                </div>`;
            });
            cont.innerHTML = html + '</div>';
            updateBadge();
        };

        window.upd = (id, d) => {
            if(!cart[id]) cart[id] = {...products.find(x=>x.id===id), qty:0};
            cart[id].qty += d;
            if(cart[id].qty <= 0) delete cart[id];
            renderMenu();
        };

        window.updateBadge = () => {
            let count = Object.values(cart).reduce((a, b) => a + b.qty, 0);
            let b = document.getElementById('cart-badge');
            b.style.display = count > 0 ? 'flex' : 'none';
            b.innerText = count;
        }

        // NAVIGATION LOGIKASI
        window.showTab = (tab, el) => {
            // Hamma itemlarni kulrang qilish
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            // Bosilganini qora qilish
            el.classList.add('active');

            // Hamma sahifalarni yopish
            document.getElementById('menu-view').style.display = 'none';
            document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
            
            // "Bahor" headeri faqat profilda yo'qoladi
            document.getElementById('app-header').style.display = (tab === 'profile') ? 'none' : 'flex';

            if(tab === 'menu') {
                document.getElementById('menu-view').style.display = 'flex';
            } else {
                document.getElementById(tab + '-page').classList.add('page-active');
                if(tab === 'profile') renderProfile();
                if(tab === 'orders') renderOrders();
            }
        };

        window.renderProfile = () => {
            const cont = document.getElementById('profile-info');
            let isAdmin = userId === MY_ID;
            cont.innerHTML = `<div style="text-align:center; padding-top:20px">
                <div style="font-size:60px">👤</div>
                <h3>Sizning ID: ${userId}</h3>
                ${isAdmin ? `<button style="background:black; color:white; width:100%; padding:15px; border-radius:10px; margin-top:20px; font-weight:bold">ADMIN PANELGA KIRISH</button>` : ''}
            </div>`;
        }

        window.searchProduct = () => {
            let val = document.getElementById('search-input').value.toLowerCase();
            filtered = products.filter(p => p.name.toLowerCase().includes(val));
            renderMenu();
        };

        window.filterCat = (cat, btn) => {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            filtered = (cat === 'Hammasi') ? products : products.filter(p => p.cat === cat);
            renderMenu();
        };

        window.onload = () => renderMenu();
    </script>
</body>
</html>
